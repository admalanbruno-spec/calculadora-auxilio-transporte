<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora - Desconto de Auxílio Transporte</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    background-color: #000000;
    color: #ffffff;
}
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }
        button {
    padding: 10px;
    font-weight: bold;
    background-color: #72CB26;
    color: white;
    border: none;
    cursor: pointer;
}
        .resultado {
    margin-top: 20px;
    background-color: #1c1c1c;
    padding: 15px;
    border: 1px solid #444;
}
.botoes {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.botoes button {
    flex: 1;
}
    </style>
</head>
<body>

<h2>Calculadora de Desconto - Auxílio Transporte</h2>

<label>Valor recebido no mês anterior (R$):</label>
<input type="number" id="valorRecebido" step="0.01">

<label>Dias solicitados em requerimento:</label>
<input type="number" id="diasSolicitados">

<label>Dias de efetivo deslocamento:</label>
<input type="number" id="diasEfetivos">

<div class="botoes">
    <button onclick="calcular()">Calcular</button>
    <button onclick="novaConsulta()">Nova Consulta</button>
</div>

<div class="resultado" id="resultado"></div>

<script>
function calcular() {

    let V = parseFloat(document.getElementById("valorRecebido").value);
    let Ds = parseInt(document.getElementById("diasSolicitados").value);
    let De = parseInt(document.getElementById("diasEfetivos").value);

    if (isNaN(V) || isNaN(Ds) || isNaN(De)) {
        document.getElementById("resultado").innerHTML = "Preencha todos os campos corretamente.";
        return;
    }

    if (De > Ds) {
        document.getElementById("resultado").innerHTML = "Os dias de efetivo deslocamento não podem ser maiores que os dias solicitados.";
        return;
    }

    let Dn = Ds - De;                 // Dias sem deslocamento
    let Vd = V / Ds;                  // Valor diário
    let Vp = Vd * De;                 // Valor proporcional devido
    let Desconto = V - Vp;            // Valor a descontar

    document.getElementById("resultado").innerHTML =
        "<strong>Resultados:</strong><br><br>" +
        "Dias sem deslocamento: " + Dn + "<br>" +
        "Valor diário do auxílio: R$ " + Vd.toFixed(2) + "<br>" +
        "Valor proporcional devido: R$ " + Vp.toFixed(2) + "<br>" +
        "<strong>Valor a descontar em folha: R$ " + Desconto.toFixed(2) + "</strong>";
}
function novaConsulta() {
document.getElementById("valorRecebido").value = "";
document.getElementById("diasSolicitados").value = "";
document.getElementById("diasEfetivos").value = "";
document.getElementById("resultado").innerHTML = "";
}
    
</script>

</body>
</html>
